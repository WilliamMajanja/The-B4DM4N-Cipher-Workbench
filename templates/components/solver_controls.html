<div id="solver-controls" class="bg-gray-800 shadow-xl rounded-lg p-6 mb-8 ring-1 ring-white/10">
    <h2 class="text-xl font-semibold text-green-300 mb-4 font-mono">3. Solver Controls</h2>
    <div id="custom-solver-type" class="mb-6 hidden">
        <label class="block text-sm font-medium text-gray-400 mb-2">Solver Type</label>
        <select id="solver-type" onchange="changeSolverType(this.value)" class="w-full md:w-1/3 bg-gray-900 border border-gray-600 text-green-300 font-mono rounded-md p-2 focus:ring-2 focus:ring-green-500 outline-none transition">
            <option value="VIGENERE">Vigenère</option>
            <option value="CAESAR">Caesar</option>
            <option value="ATBASH">Atbash</option>
        </select>
    </div>

    <div id="vigenere-controls" class="space-y-4 hidden">
        <div>
            <label for="keyword-input" class="block text-sm font-medium text-gray-400 mb-2">Enter Keyword</label>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="keyword-input" oninput="updateKeyword(this.value)" placeholder="e.g., KRYPTOS" class="flex-grow bg-gray-900 border border-gray-600 text-green-300 text-xl font-mono tracking-widest rounded-md p-3 focus:ring-2 focus:ring-green-500 outline-none transition" />
                <button id="suggest-keywords-btn" onclick="suggestKeywords()" class="flex items-center justify-center bg-sky-600 hover:bg-sky-700 disabled:bg-gray-600 text-white font-bold py-3 px-4 rounded-lg transition-colors duration-200">
                    <span id="suggest-btn-text">Suggest Keywords</span>
                    <span id="suggest-spinner" class="hidden">
                        <svg class="animate-spin -ml-1 mr-3 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </div>
        <div id="keyword-suggestions" class="hidden p-4 bg-gray-900/50 rounded-lg">
            <h4 class="text-gray-300 font-semibold mb-2">AI Keyword Suggestions (click to analyze):</h4>
            <div id="keyword-suggestions-grid" class="grid grid-cols-1 md:grid-cols-3 gap-2"></div>
        </div>
    </div>

    <div id="caesar-controls" class="hidden">
        <label for="caesar-shift" class="block text-sm font-medium text-gray-400 mb-2">Shift Amount: <span id="caesar-shift-value" class="font-mono text-lg text-green-300">3</span></label>
        <input type="range" id="caesar-shift" min="1" max="25" value="3" oninput="updateCaesarShift(this.value)" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-green-500" />
    </div>

    <div id="atbash-controls" class="hidden">
        <p class="text-gray-400">The Atbash cipher is a simple substitution cipher where the first letter of the alphabet is replaced by the last, the second by the second to last, and so on. No key is required.</p>
    </div>

    <div class="mt-6">
        <h3 class="block text-sm font-medium text-gray-400 mb-2">Decrypted Plaintext</h3>
        <div id="decrypted-text" class="w-full min-h-[5.5rem] bg-gray-900 border border-gray-700 rounded-md p-3 font-mono text-gray-300 tracking-wider overflow-y-auto text-sm"></div>
    </div>
</div>
