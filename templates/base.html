<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}The B4DM4N Cipher Workbench{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        html { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen font-sans">
    <div id="api-status"></div>
    <div class="max-w-7xl mx-auto p-4 sm:p-6 md:p-8">
        {% block header %}{% endblock %}
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', path='js/main.js') }}"></script>
</body>
</html>
